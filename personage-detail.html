<body id="personage-detail-page">

        <section class="s">

    <main>
        <div class="container">
            <h2>favorieten detail</h2>

                    <div class="item-box"></div>

                </div>

                <p>Losses: 2 <button>Losses +</button></p>
                <textarea placeholder="notitie"></textarea>
            </div>
        </div>
